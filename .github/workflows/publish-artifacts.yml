on:
    workflow_call:
        inputs:
            release_tag:
                required: true
                type: string
            version_override:
                required: true
                type: string
            macos_bundle_version:
                required: true
                type: string
            macos_short_version:
                required: true
                type: string
        secrets:
            upload_token:
                required: false
            # TODO: Add these once Developer ID signing is set up
            # mac_developer_id_cert:
            #     required: false
            # mac_developer_id_key:
            #     required: false
            # mac_dev_id_keychain_pwd:
            #     required: false
            # apple_notary_api_issuer:
            #     required: false
            # apple_notary_api_key_id:
            #     required: false
            # apple_notary_api_key:
            #     required: false
            # apple_team_id:
            #     required: false

name: publish-artifacts

jobs:
    build-darwin-arm64-artifacts:
        runs-on: macos-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-go@v6
              with:
                  go-version: "1.26.4"

            - uses: extractions/setup-just@v4
              with:
                  just-version: "1.54.0"

            - name: Build mimi darwin arm64 artifact
              run: just release-ci-darwin arm64 ${{ inputs.version_override }}

            - name: Generate man pages
              run: go run ./cmd/genman build/man

            - name: Bundle mimi-darwin-arm64
              run: |
                  mkdir -p build/arm64/Mimi.app/Contents/{MacOS,Resources}
                  cp bin/mimi-darwin-arm64 build/arm64/Mimi.app/Contents/MacOS/mimi
                  chmod +x build/arm64/Mimi.app/Contents/MacOS/mimi
                  # cp resources/icon.icns build/arm64/Mimi.app/Contents/Resources/icon.icns
                  cp resources/Mimi.entitlements build/arm64/Mimi.app/Contents/Resources/Mimi.entitlements
                  mkdir -p build/arm64/share/man/man1
                  cp build/man/*.1 build/arm64/share/man/man1/
                  sed \
                    -e "s/BUNDLE_VERSION/${{ inputs.macos_bundle_version }}/g" \
                    -e "s/SHORT_VERSION/${{ inputs.macos_short_version }}/g" \
                    -e "s/BUILD_ID/${{ inputs.version_override }}/g" \
                    resources/Info.plist.template > build/arm64/Mimi.app/Contents/Info.plist
                  mkdir -p build/arm64/bin
                  cp bin/mimi-darwin-arm64 build/arm64/bin/mimi
                  chmod +x build/arm64/bin/mimi

            - name: Codesign mimi-darwin-arm64 (ad-hoc)
              run: |
                  # TODO: Replace ad-hoc with Developer ID + notarization when cert is set up
                  #       Remove this step and uncomment the "Developer ID sign & notarize" step below.
                  codesign --force --deep --sign - \
                    --entitlements resources/Mimi.entitlements \
                    --options runtime \
                    build/arm64/Mimi.app

            # # TODO: Enable when Developer ID cert is set up (and disable the ad-hoc step above)
            # - name: Developer ID sign & notarize
            #   uses: ./.github/actions/developer-id-notarize
            #   with:
            #     app-path: build/arm64/Mimi.app
            #     developer-id-identity: 'Developer ID Application: Your Name (TEAM_ID)'
            #     mac-developer-id-cert: ${{ secrets.mac_developer_id_cert }}
            #     mac-developer-id-key: ${{ secrets.mac_developer_id_key }}
            #     mac-dev-id-keychain-pwd: ${{ secrets.mac_dev_id_keychain_pwd }}
            #     apple-notary-api-issuer: ${{ secrets.apple_notary_api_issuer }}
            #     apple-notary-api-key-id: ${{ secrets.apple_notary_api_key_id }}
            #     apple-notary-api-key: ${{ secrets.apple_notary_api_key }}
            #     apple-team-id: ${{ secrets.apple_team_id }}

            - name: Package mimi-darwin-arm64
              run: |
                  cd build/arm64
                  zip -r ../../mimi-darwin-arm64.zip bin Mimi.app share
                  cd ../..

            - name: Generate darwin arm64 checksum
              run: |
                  shasum -a 256 mimi-darwin-arm64.zip | awk '{print $1}' > mimi-darwin-arm64.zip.sha256
                  ls -l mimi-darwin-arm64.zip mimi-darwin-arm64.zip.sha256

            - name: Upload darwin arm64 release artifacts
              env:
                  GH_TOKEN: ${{ secrets.upload_token || github.token }}
              run: |
                  gh release upload "${{ inputs.release_tag }}" mimi-darwin-arm64.zip mimi-darwin-arm64.zip.sha256 --clobber

    build-darwin-amd64-artifacts:
        runs-on: macos-15-intel
        permissions:
            contents: write
        steps:
